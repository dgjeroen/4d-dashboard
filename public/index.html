<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* ══ TOKENS ═══════════════════════════════════════════════════════════════
       Dark mode (default) – inspired by editorial dashboards                 */
    :root {
      --bg:       #0e1117;
      --surface:  #161b27;
      --card:     #1c2233;
      --border:   #2d3450;
      --border-hi:#404d72;
      --text:     #e8eaf6;
      --text-2:   #b0b8d8;
      --muted:    #6b7599;
      --accent:   #4f8ef7;        /* Group A – blue */
      --accent-bg:#0d2045;
      --amber:    #f5a623;        /* Group B – amber */
      --amber-bg: #2e1f00;
      --ig:       #e1306c;
      --tt:       #ff2d55;
      --bsky:     #0085ff;
      --green:    #22d07a;
      --green-bg: #0a2a1a;
      --red:      #f05252;
      --red-bg:   #2a0d0d;
      --pill-a-bg:#122244; --pill-a-txt:#7eb3ff;
      --pill-b-bg:#2b1800; --pill-b-txt:#f5c842;
      --pill-d-bg:#1e2438; --pill-d-txt:#8892b0;
      color-scheme: dark;
    }
    [data-theme="light"] {
      --bg:       #f0f2f8;
      --surface:  #ffffff;
      --card:     #ffffff;
      --border:   #d0d7e8;
      --border-hi:#9fadc8;
      --text:     #1a2035;
      --text-2:   #3d4d6e;
      --muted:    #6b7a9f;
      --accent:   #1a5fe8;
      --accent-bg:#dde8fc;
      --amber:    #c47d00;
      --amber-bg: #fff3d6;
      --ig:       #c7295c;
      --tt:       #cc1740;
      --green:    #15803d;
      --green-bg: #dcfce7;
      --red:      #dc2626;
      --red-bg:   #fee2e2;
      --pill-a-bg:#dde8fc; --pill-a-txt:#1a5fe8;
      --pill-b-bg:#fff3d6; --pill-b-txt:#92600a;
      --pill-d-bg:#edf0f7; --pill-d-txt:#4a5568;
      color-scheme: light;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      transition: background .2s, color .2s;
    }

    /* ── Launcher ─────────────────────────────────────────────────────────── */
    #launcher {
      position: fixed; inset: 0; z-index: 999; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      padding: 44px 20px; overflow-y: auto;
    }
    #launcher h1 {
      font-size: 1.6rem; font-weight: 800; letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .sub { color: var(--muted); font-size: .875rem; margin-bottom: 32px; }
    .new-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 10px 24px; border-radius: 10px; cursor: pointer;
      font-size: .875rem; font-weight: 700; margin-bottom: 28px;
      transition: filter .15s; letter-spacing: .01em;
    }
    .new-btn:hover { filter: brightness(1.12); }
    .topic-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
      gap: 12px; width: 100%; max-width: 960px; margin-bottom: 16px;
    }
    .topic-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px; cursor: pointer; transition: border-color .15s, box-shadow .15s;
    }
    .topic-card:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(79,142,247,.1); }
    .topic-card h3 { font-size: .95rem; font-weight: 700; margin-bottom: 6px; }
    .tc-meta { font-size: .73rem; color: var(--muted); line-height: 1.9; }
    .tc-groups { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .tc-gpill { font-size: .7rem; padding: 2px 10px; border-radius: 5px; font-weight: 600; }
    .tc-gpill.a { background: var(--pill-a-bg); color: var(--pill-a-txt); }
    .tc-gpill.b { background: var(--pill-b-bg); color: var(--pill-b-txt); }

    /* Create form */
    #createForm {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 24px; width: 100%; max-width: 640px; margin-bottom: 24px; display: none;
    }
    #createForm h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    .cf-input {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: .875rem; margin-bottom: 12px;
      transition: border-color .12s;
    }
    .cf-input:focus { outline: none; border-color: var(--accent); }
    .group-section { margin-bottom: 18px; }
    .group-label {
      font-size: .72rem; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .group-label span { font-size: .85rem; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; min-height: 28px; }
    .tag-pill {
      background: var(--pill-a-bg); color: var(--pill-a-txt);
      border-radius: 5px; padding: 3px 10px; font-size: .75rem; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .tag-pill.b { background: var(--pill-b-bg); color: var(--pill-b-txt); }
    .tag-pill .rm { cursor: pointer; opacity: .55; }
    .tag-pill .rm:hover { opacity: 1; color: var(--red); }
    .tag-add-row { display: flex; gap: 6px; }
    .tag-add-row input {
      flex: 1; padding: 7px 11px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .8rem;
      transition: border-color .12s;
    }
    .tag-add-row input:focus { outline: none; border-color: var(--accent); }
    .tag-add-row button {
      padding: 7px 13px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; cursor: pointer; font-size: .8rem; font-weight: 700;
    }
    .form-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-start {
      background: var(--green); color: #fff; border: none;
      padding: 9px 20px; border-radius: 9px; cursor: pointer; font-weight: 700; font-size: .875rem;
    }
    .btn-cancel {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      padding: 9px 16px; border-radius: 9px; cursor: pointer; font-size: .875rem;
    }
    .btn-cancel:hover { border-color: var(--border-hi); color: var(--text); }

    /* ── Sticky top ───────────────────────────────────────────────────────── */
    #stickyTop { position: sticky; top: 0; z-index: 200; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 8px 16px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite;
    }
    .dot.off { background: var(--red); box-shadow: 0 0 8px var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    #topicName {
      font-size: .875rem; font-weight: 800; white-space: nowrap;
      letter-spacing: -.01em; color: var(--text);
    }
    #stats { font-size: .68rem; color: var(--muted); white-space: nowrap; }

    /* Filter buttons */
    .fbtn {
      padding: 4px 11px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-2); cursor: pointer; font-size: .73rem;
      font-weight: 600; transition: all .12s; white-space: nowrap; letter-spacing: .01em;
    }
    .fbtn:hover { border-color: var(--border-hi); color: var(--text); }
    .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .fbtn.ga.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .fbtn.gb.active { background: var(--amber); border-color: var(--amber); color: #fff; }
    .fbtn.ig.active { background: var(--ig);    border-color: var(--ig);    color: #fff; }
    .fbtn.tt.active { background: var(--tt);    border-color: var(--tt);    color: #fff; }
    .fbtn.bsky.active { background: var(--bsky);  border-color: var(--bsky);  color: #fff; }
    .fbtn.refresh { margin-left: auto; }
    .fbtn.refresh.loading { opacity: .45; cursor: not-allowed; }
    .sep { color: var(--border-hi); font-size: .9rem; user-select: none; }

    .hdr-btn {
      padding: 4px 11px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .73rem;
      font-weight: 600; transition: all .12s;
    }
    .hdr-btn:hover { border-color: var(--border-hi); color: var(--text); }

    /* theme toggle */
    .theme-btn {
      padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .75rem;
      line-height: 1; transition: all .12s;
    }
    .theme-btn:hover { border-color: var(--border-hi); color: var(--text); }

    /* Hashtag bar */
    #hashtagBar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 6px 16px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
    }
    #hashtagBar-label {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); white-space: nowrap; margin-right: 4px;
    }
    .hpill {
      display: inline-flex; align-items: center; gap: 3px;
      border-radius: 5px; padding: 2px 9px; font-size: .72rem; font-weight: 600;
      cursor: pointer; transition: filter .1s;
    }
    .hpill:hover { filter: brightness(1.15); }
    .hpill.a    { background: var(--pill-a-bg); color: var(--pill-a-txt); }
    .hpill.b    { background: var(--pill-b-bg); color: var(--pill-b-txt); }
    .hpill.disc { background: var(--pill-d-bg); color: var(--pill-d-txt); }
    .hpill.required { outline: 2px solid currentColor; outline-offset: 1px; font-weight: 800; }
    .hpill.required.a    { background: var(--accent); color: #fff; }
    .hpill.required.b    { background: var(--amber);  color: #fff; }
    .hpill.required.disc { background: var(--muted);  color: #fff; }
    .hpill .hx { cursor: pointer; opacity: .55; margin-left: 2px; font-size: .8rem; line-height: 1; font-weight: 700; }
    .hpill .hx:hover { opacity: 1; color: var(--red); }
    .hpill.core .hx { display: none; }

    #reqBar {
      padding: 4px 16px 5px; background: var(--red-bg); border-bottom: 2px solid var(--red);
      display: none; flex-wrap: wrap; gap: 5px; align-items: center; font-size: .69rem;
    }
    #reqBar.has-req { display: flex; }
    .req-pill {
      display: inline-flex; align-items: center; gap: 3px; border-radius: 5px;
      padding: 2px 9px; background: var(--red-bg); color: var(--red);
      border: 1px solid var(--red); font-weight: 700; cursor: pointer; font-size: .7rem;
    }
    .req-pill:hover { filter: brightness(1.2); }

    /* ── Hashtag suggestions bar ──────────────────────────────────────────── */
    #suggestBar {
      padding: 5px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: none; flex-wrap: wrap; gap: 5px; align-items: center; font-size: .69rem;
    }
    #suggestBar.has-suggestions { display: flex; }
    .suggest-label {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); white-space: nowrap; margin-right: 4px;
    }
    .suggest-pill {
      display: inline-flex; align-items: center; gap: 4px; border-radius: 5px;
      padding: 3px 9px; background: var(--surface); color: var(--text-2);
      border: 1px solid var(--border); font-size: .72rem; font-weight: 600;
    }
    .suggest-pill .sp-count { color: var(--muted); font-size: .65rem; }
    .suggest-pill .sp-ok {
      cursor: pointer; color: var(--green); font-size: .8rem; line-height: 1;
      padding: 0 2px; transition: transform .1s;
    }
    .suggest-pill .sp-ok:hover { transform: scale(1.3); }
    .sp-dismiss-all {
      margin-left: auto; font-size: .68rem; padding: 2px 8px; border-radius: 5px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; white-space: nowrap;
    }
    .sp-dismiss-all:hover { color: var(--red); border-color: var(--red); }
    .suggest-pill .sp-no {
      cursor: pointer; color: var(--muted); font-size: .8rem; line-height: 1;
      padding: 0 2px; transition: color .1s;
    }
    .suggest-pill .sp-no:hover { color: var(--red); }

    /* ── Feed ─────────────────────────────────────────────────────────────── */
    #feed {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
      gap: 16px; padding: 18px; max-width: 1800px; margin: 0 auto;
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; transition: transform .15s, box-shadow .15s; position: relative;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,.35); }
    .card.fresh { animation: fadeIn .3s ease; }
    .card.used  { opacity: .42; border-color: var(--green); }
    .card.skipped { opacity: .3; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

    .review-badge {
      position: absolute; top: 9px; left: 9px; z-index: 2;
      padding: 2px 9px; border-radius: 5px; font-size: .63rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .review-badge.used    { background: var(--green); color: #fff; }
    .review-badge.skipped { background: var(--border-hi); color: var(--muted); }

    .card-img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; background: var(--border); }
    .card-img-ph {
      width: 100%; aspect-ratio: 4/5; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: var(--border-hi);
    }
    .card-meta {
      padding: 9px 12px 4px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .badge {
      font-size: .62rem; font-weight: 800; padding: 2px 8px; border-radius: 5px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge.instagram { background: var(--ig);   color: #fff; }
    .badge.tiktok    { background: var(--tt);   color: #fff; }
    .badge.bluesky   { background: var(--bsky); color: #fff; }
    .badge.ga { background: var(--pill-a-bg); color: var(--pill-a-txt); }
    .badge.gb { background: var(--pill-b-bg); color: var(--pill-b-txt); }
    .card-author {
      margin-left: auto; font-size: .8rem; font-weight: 700;
      color: var(--text-2); text-decoration: none; transition: color .1s;
    }
    .card-author:hover { color: var(--accent); }
    .card-time  { padding: 1px 12px 0; font-size: .67rem; color: var(--muted); }
    .card-likes { font-size: .67rem; color: var(--muted); float: right; }
    .caption {
      padding: 6px 12px 4px; font-size: .8rem; line-height: 1.55; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
      cursor: pointer;
    }
    .caption.open { display: block; -webkit-line-clamp: unset; }
    .actions {
      padding: 6px 12px 11px; display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
    }
    .btn {
      padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .68rem;
      font-weight: 600; display: flex; align-items: center; gap: 3px;
      transition: all .12s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--border-hi); color: var(--text); }
    .btn.ok   { background: var(--green-bg); color: var(--green); border-color: var(--green); }
    .btn.used { background: var(--green-bg); color: var(--green); border-color: var(--green); }
    .btn.skip { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-open {
      margin-left: auto; padding: 3px 9px; border-radius: 6px; border: 1px solid var(--border);
      color: var(--muted); font-size: .68rem; font-weight: 600; text-decoration: none;
      transition: all .12s;
    }
    .btn-open:hover { border-color: var(--border-hi); color: var(--text); }

    .empty {
      grid-column: 1/-1; text-align: center; padding: 70px 20px; color: var(--muted);
    }
    .empty h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }

    /* ── Instagram blocked banner ───────────────────────────────────────────────────── */
    #igBanner {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #450a0a; border-bottom: 2px solid var(--red);
      padding: 9px 16px; align-items: center; gap: 12px;
      font-size: .82rem; flex-wrap: wrap;
    }
    #igBanner.visible { display: flex; }
    #igBanner strong { color: #fca5a5; }
    .ig-upload-label {
      background: #e1306c; color: #fff; padding: 6px 14px; border-radius: 8px;
      cursor: pointer; font-weight: 700; font-size: .78rem;
      transition: filter .15s; white-space: nowrap;
    }
    .ig-upload-label:hover { filter: brightness(1.15); }
    .ig-upload-label input[type=file] { display: none; }
    #igUploadStatus { color: #fde68a; font-size: .78rem; }
  </style>
</head>
<body>
<!-- ── Instagram blocked banner ──────────────────────────────────────────────── -->
<div id="igBanner">
  <strong>⚠️ Instagram geblokkeerd</strong>
  <span>De sessie is verlopen of gedetecteerd als bot. Upload nieuwe cookies om door te gaan.</span>
  <label class="ig-upload-label" style="margin-left:auto">
    📂 Sessie uploaden
    <input type="file" accept=".json" onchange="uploadIgSession(this)">
  </label>
  <span id="igUploadStatus"></span>
  <a href="https://cookie-editor.com" target="_blank" rel="noopener"
     style="color:#fca5a5;font-size:.75rem;white-space:nowrap">Hoe exporteer ik cookies? →</a>
</div>
<!-- ── Launcher ──────────────────────────────────────────────────────────── -->
<div id="launcher">
  <h1>🏆 Social Dashboard</h1>
  <p class="sub">Kies een onderwerp of start een nieuw dashboard</p>
  <button class="new-btn" onclick="showCreateForm()">+ Nieuw onderwerp</button>

  <div id="createForm">
    <h2>Nieuw onderwerp aanmaken</h2>
    <input class="cf-input" type="text" id="topicNameInput" placeholder="Naam onderwerp (bijv. Vierdaagse 2025)" />

    <div class="group-section">
      <div class="group-label">📘 Groep A — <input class="cf-input" style="display:inline;width:auto;padding:2px 7px;font-size:.82rem" type="text" id="groupAName" value="Vierdaagse" /></div>
      <div class="tag-row" id="rowA"></div>
      <div class="tag-add-row">
        <input type="text" id="inpA" placeholder="Hashtag (zonder #)" onkeydown="if(event.key==='Enter')addTag('a')" />
        <button onclick="addTag('a')">+</button>
      </div>
    </div>

    <div class="group-section">
      <div class="group-label">🟡 Groep B — <input class="cf-input" style="display:inline;width:auto;padding:2px 7px;font-size:.82rem" type="text" id="groupBName" value="Feesten" /></div>
      <div class="tag-row" id="rowB"></div>
      <div class="tag-add-row">
        <input type="text" id="inpB" placeholder="Hashtag (zonder #)" onkeydown="if(event.key==='Enter')addTag('b')" />
        <button onclick="addTag('b')">+</button>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-start"  onclick="createTopic()">Starten</button>
      <button class="btn-cancel" onclick="hideCreateForm()">Annuleren</button>
    </div>
  </div>

  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- ── Dashboard ─────────────────────────────────────────────────────────── -->
<div id="app" style="display:none">
  <div id="stickyTop">
    <header>
      <div class="dot" id="dot"></div>
      <span id="topicName">–</span>
      <span class="sep">|</span>

      <!-- Group filter (radio) -->
      <button class="fbtn active" id="fAll" onclick="setGroupFilter('all',this)">Alles</button>
      <button class="fbtn ga"     id="fA"   onclick="setGroupFilter('a',this)">Groep A</button>
      <button class="fbtn gb"     id="fB"   onclick="setGroupFilter('b',this)">Groep B</button>
      <span class="sep">|</span>

      <!-- Platform toggles (independent) -->
      <button class="fbtn ig active" id="fIG" onclick="togglePlatform('instagram')">Instagram</button>
      <button class="fbtn tt active" id="fTT" onclick="togglePlatform('tiktok')">TikTok</button>
      <button class="fbtn bsky active" id="fBsky" onclick="togglePlatform('bluesky')">Bluesky</button>
      <span class="sep">|</span>

      <!-- Sort -->
      <button class="fbtn" id="sortBtn" onclick="toggleSort()">📊 Datum</button>

      <!-- Hide reviewed -->
      <button class="fbtn" id="hideBtn" onclick="toggleHideReviewed()">👁 Beoordeeld</button>

      <span id="stats"></span>
      <button class="fbtn refresh" id="refreshBtn" onclick="manualScrape()">↻ Vernieuwen</button>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Schakel licht/donker">☀</button>
      <button class="hdr-btn" onclick="switchTopic()">⇄ Wissel</button>
    </header>

    <div id="hashtagBar"></div>
    <div id="reqBar">
      <span style="color:var(--muted);margin-right:4px;white-space:nowrap;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em">🔍 Verplicht:</span>
      <span id="reqPills"></span>
      <button class="fbtn" style="margin-left:auto;font-size:.68rem;padding:2px 8px" onclick="clearRequired()">✕ Wis filter</button>
    </div>

    <div id="suggestBar">
      <span class="suggest-label">💡 Suggesties</span>
      <span id="suggestPills"></span>
      <button class="sp-dismiss-all" id="dismissAllBtn" onclick="dismissAllSuggestions()" title="Alle suggesties afwijzen">Alles afwijzen</button>
    </div>
  </div>

  <div id="feed"></div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let allPosts       = [];
  let knownIds       = new Set();
  let activeGroup    = 'all';
  let showIG         = true;
  let showTT         = true;
  let showBsky       = true;
  let sortByLikes    = false;
  let hideReviewed   = false;
  let requiredTags   = new Set();
  let activeTopic    = null;
  let newTags        = {
    a: ['4daagse','nijmeegsevierdaagse','vierdaagse','nijmegen','vierdaagse2025'],
    b: ['vierdaagsefeesten','4daagsefeesten'],
  };

  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const timeLabel = ts => new Date(ts).toLocaleString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});

  // ── Launcher ───────────────────────────────────────────────────────────────
  function renderTopicGrid(list) {
    const el = document.getElementById('topicGrid');
    if (!list.length) {
      el.innerHTML = '<p style="color:var(--muted);grid-column:1/-1">Nog geen onderwerpen. Maak er een aan!</p>';
      return;
    }
    el.innerHTML = list.map(t => `
      <div class="topic-card" onclick="selectTopic('${t.id}')">
        <h3>${esc(t.name)}</h3>
        <div class="tc-meta">
          📅 ${new Date(t.lastActiveAt).toLocaleString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
          &nbsp;·&nbsp; ✅ ${t.reviewedCount} beoordeeld
        </div>
        <div class="tc-groups">
          <span class="tc-gpill a">📘 ${esc(t.groupA.name)}: ${t.groupA.hashtags.slice(0,3).map(h=>'#'+h).join(' ')}${t.groupA.hashtags.length>3?' …':''}</span>
          ${t.groupB.hashtags.length ? `<span class="tc-gpill b">🟡 ${esc(t.groupB.name)}: ${t.groupB.hashtags.slice(0,3).map(h=>'#'+h).join(' ')}${t.groupB.hashtags.length>3?' …':''}</span>` : ''}
        </div>
        <div style="margin-top:10px;display:flex;gap:6px">
          <button class="btn-start" style="font-size:.75rem;padding:4px 12px" onclick="event.stopPropagation();selectTopic('${t.id}')">▶ Open</button>
          <button class="btn-cancel" style="font-size:.75rem;padding:4px 10px" onclick="event.stopPropagation();editTopic('${t.id}')">✏️ Bewerk</button>
        </div>
      </div>`).join('');
  }

  function showCreateForm() {
    editingTopicId = null;
    newTags.a = ['4daagse','nijmeegsevierdaagse','vierdaagse','nijmegen','vierdaagse2025'];
    newTags.b = ['vierdaagsefeesten','4daagsefeesten'];
    document.getElementById('topicNameInput').value = '';
    document.getElementById('groupAName').value     = 'Vierdaagse';
    document.getElementById('groupBName').value     = 'Feesten';
    document.getElementById('createForm').style.display = 'block';
    document.querySelector('#createForm .btn-start').textContent = 'Starten';
    renderNewTags('a'); renderNewTags('b');
    document.getElementById('topicNameInput').focus();
  }

  function renderNewTags(grp) {
    const cls = grp === 'b' ? ' b' : '';
    document.getElementById('row'+grp.toUpperCase()).innerHTML =
      newTags[grp].map((t,i) =>
        `<span class="tag-pill${cls}">#${esc(t)}<span class="rm" onclick="removeTag('${grp}',${i})">×</span></span>`
      ).join('');
  }
  function addTag(grp) {
    const inp = document.getElementById('inp'+grp.toUpperCase());
    const v = inp.value.trim().replace(/^#/,'').toLowerCase();
    if (v && !newTags[grp].includes(v) && !newTags[grp === 'a' ? 'b' : 'a'].includes(v)) {
      newTags[grp].push(v); renderNewTags(grp);
    }
    inp.value = '';
  }
  function removeTag(grp, i) { newTags[grp].splice(i,1); renderNewTags(grp); }

  function createTopic() {
    const name = document.getElementById('topicNameInput').value.trim();
    if (!name) { alert('Geef het onderwerp een naam.'); return; }
    if (!newTags.a.length && !newTags.b.length) { alert('Voeg minimaal één hashtag toe.'); return; }
    const payload = {
      name,
      groupA: { name: document.getElementById('groupAName').value || 'Groep A', hashtags: [...newTags.a] },
      groupB: { name: document.getElementById('groupBName').value || 'Groep B', hashtags: [...newTags.b] },
    };
    if (editingTopicId) {
      socket.emit('topic:update', { id: editingTopicId, ...payload });
      editingTopicId = null;
    } else {
      socket.emit('topic:create', payload);
    }
    hideCreateForm();
  }
  function hideCreateForm() {
    document.getElementById('createForm').style.display = 'none';
    document.querySelector('#createForm .btn-start').textContent = 'Starten';
    editingTopicId = null;
  }
  function selectTopic(id) { socket.emit('topic:select', { id }); }

  let editingTopicId = null;
  function editTopic(id) {
    const t = (window._topicList || []).find(x => x.id === id);
    if (!t) return;
    editingTopicId = id;
    newTags.a = [...t.groupA.hashtags];
    newTags.b = [...t.groupB.hashtags];
    document.getElementById('topicNameInput').value = t.name;
    document.getElementById('groupAName').value     = t.groupA.name;
    document.getElementById('groupBName').value     = t.groupB.name;
    document.getElementById('createForm').style.display = 'block';
    // Change button label
    document.querySelector('#createForm .btn-start').textContent = 'Opslaan';
    renderNewTags('a'); renderNewTags('b');
    document.getElementById('topicNameInput').focus();
  }
  function switchTopic() {
    document.getElementById('launcher').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  // ── Hashtag bar ────────────────────────────────────────────────────────────
  function renderHashtagBar(topic, hashtags) {
    if (!topic) return;
    const setA    = new Set(topic.groupA.hashtags);
    const setB    = new Set(topic.groupB.hashtags);
    const coreSet = new Set([...topic.groupA.hashtags, ...topic.groupB.hashtags]);
    document.getElementById('hashtagBar').innerHTML =
      '<span id="hashtagBar-label">Volgend</span>' +
      hashtags.map(t => {
        const cls  = setA.has(t) ? 'a' : setB.has(t) ? 'b' : 'disc';
        const core = coreSet.has(t) ? ' core' : '';
        const req  = requiredTags.has(t) ? ' required' : '';
        return `<span class="hpill ${cls}${core}${req}" onclick="toggleRequired('${t}')" title="${core ? 'Kernhashtag – kan niet worden verwijderd' : 'Klik om te filteren'}">#${esc(t)}<span class="hx" onclick="event.stopPropagation();toggleHashtag('${t}')">×</span></span>`;
      }).join('');
    renderReqBar();
  }
  function toggleRequired(tag) {
    if (requiredTags.has(tag)) requiredTags.delete(tag);
    else requiredTags.add(tag);
    renderHashtagBar(activeTopic, activeTopic?.hashtags || []);
    renderPosts();
  }
  function clearRequired() {
    requiredTags.clear();
    renderHashtagBar(activeTopic, activeTopic?.hashtags || []);
    renderPosts();
  }
  function renderReqBar() {
    const bar = document.getElementById('reqBar');
    if (requiredTags.size === 0) { bar.classList.remove('has-req'); return; }
    bar.classList.add('has-req');
    document.getElementById('reqPills').innerHTML =
      [...requiredTags].map(t =>
        `<span class="req-pill" onclick="toggleRequired('${t}')">#${esc(t)} ×</span>`
      ).join('');
  }
  function toggleHashtag(tag) {
    socket.emit('topic:updateHashtags', {
      hashtags: (activeTopic?.hashtags || []).filter(h => h !== tag)
    });
  }

  // ── Filters ────────────────────────────────────────────────────────────────
  function setGroupFilter(f, btn) {
    activeGroup = f;
    ['fAll','fA','fB'].forEach(id => document.getElementById(id)?.classList.remove('active'));
    btn.classList.add('active');
    renderPosts();
  }
  function togglePlatform(p) {
    if (p === 'instagram') { showIG   = !showIG;   document.getElementById('fIG').classList.toggle('active', showIG); }
    else if (p === 'tiktok') { showTT = !showTT;   document.getElementById('fTT').classList.toggle('active', showTT); }
    else                   { showBsky = !showBsky; document.getElementById('fBsky').classList.toggle('active', showBsky); }
    renderPosts();
  }
  function toggleSort() {
    sortByLikes = !sortByLikes;
    document.getElementById('sortBtn').textContent = sortByLikes ? '📊 Likes' : '📊 Datum';
    renderPosts();
  }
  function toggleHideReviewed() {
    hideReviewed = !hideReviewed;
    document.getElementById('hideBtn').classList.toggle('active', hideReviewed);
    renderPosts();
  }

  function filtered() {
    let posts = allPosts.filter(p => {
      if (hideReviewed && p.reviewStatus) return false;
      if (!showIG && p.platform === 'instagram') return false;
      if (!showTT && p.platform === 'tiktok')    return false;
      if (!showBsky && p.platform === 'bluesky') return false;
      if (activeGroup === 'a' && p.group !== 'a' && p.group !== 'both') return false;
      if (activeGroup === 'b' && p.group !== 'b' && p.group !== 'both') return false;
      if (requiredTags.size > 0) {
        const postTags = new Set(p.hashtags || []);
        if (![...requiredTags].every(t => postTags.has(t))) return false;
      }
      return true;
    });
    return sortByLikes ? [...posts].sort((a,b)=>b.likes-a.likes) : posts;
  }

  // ── Group badge label ──────────────────────────────────────────────────────
  function groupBadge(p) {
    if (!activeTopic) return '';
    const gA = activeTopic.groupA?.name || 'A';
    const gB = activeTopic.groupB?.name || 'B';
    if (p.group === 'both') return `<span class="badge ga">${esc(gA)}</span><span class="badge gb">${esc(gB)}</span>`;
    if (p.group === 'a') return `<span class="badge ga">${esc(gA)}</span>`;
    if (p.group === 'b') return `<span class="badge gb">${esc(gB)}</span>`;
    return '';
  }

  // ── Copy helpers ──────────────────────────────────────────────────────────
  function flash(el, text) {
    if (!el) return; const orig = el.textContent;
    el.textContent = text; el.classList.add('ok');
    setTimeout(() => { el.textContent = orig; el.classList.remove('ok'); }, 2000);
  }
  function copyText(id) {
    const p = allPosts.find(x=>x.id===id); if (!p) return;
    navigator.clipboard.writeText(p.caption)
      .then(() => flash(document.querySelector(`[data-copy="${id}"]`), '✓ Gekopieerd'));
  }
  function copyEmbed(id) {
    const p = allPosts.find(x=>x.id===id); if (!p||!p.imageUrl) return;
    const s = `<a href="${esc(p.postUrl)}" target="_blank" rel="noopener"><img src="${esc(p.imageUrl)}" alt="${esc(p.caption.slice(0,80))}" style="max-width:100%;height:auto;" loading="lazy"></a>`;
    navigator.clipboard.writeText(s)
      .then(() => flash(document.querySelector(`[data-embed="${id}"]`), '✓ Gekopieerd'));
  }
  function toggleCaption(id) { document.querySelector(`[data-cap="${id}"]`)?.classList.toggle('open'); }
  function reviewPost(id, status) {
    const p = allPosts.find(x=>x.id===id);
    socket.emit('post:review', { postId: id, status: p?.reviewStatus===status ? null : status });
  }

  // ── Card render ────────────────────────────────────────────────────────────
  function cardHtml(p) {
    const fresh = !knownIds.has(p.id) ? ' fresh' : '';
    const rs    = p.reviewStatus || '';
    const imgEl = p.imageUrl
      ? `<a href="${esc(p.postUrl)}" target="_blank" rel="noopener"><img class="card-img" src="${esc(p.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none'"></a>`
      : `<div class="card-img-ph">${p.platform==='tiktok'?'🎵':'📷'}</div>`;
    const embedBtn = p.imageUrl ? `<button class="btn" data-embed="${p.id}" onclick="copyEmbed('${p.id}')">🖼️ Embed</button>` : '';
    const capEl   = p.caption  ? `<div class="caption" data-cap="${p.id}" onclick="toggleCaption('${p.id}')">${esc(p.caption)}</div>` : '';
    const badge   = rs ? `<div class="review-badge ${rs}">${rs==='used'?'✓ Gebruikt':'✗ Skip'}</div>` : '';
    return `
      <div class="card${fresh}${rs?' '+rs:''}">
        ${badge}
        ${imgEl}
        <div class="card-meta">
          <span class="badge ${p.platform}">${p.platform}</span>
          ${groupBadge(p)}
          <a class="card-author" href="${esc(p.authorUrl)}" target="_blank" rel="noopener">@${esc(p.author)}</a>
        </div>
        <div class="card-time">${timeLabel(p.timestamp)}<span class="card-likes">❤️ ${p.likes.toLocaleString('nl-NL')}</span></div>
        ${capEl}
        <div class="actions">
          <button class="btn" data-copy="${p.id}" onclick="copyText('${p.id}')">📋 Tekst</button>
          ${embedBtn}
          <button class="btn${rs==='used'?' used':''}"    onclick="reviewPost('${p.id}','used')">✓</button>
          <button class="btn${rs==='skipped'?' skip':''}" onclick="reviewPost('${p.id}','skipped')">✗</button>
          <a class="btn-open" href="${esc(p.postUrl)}" target="_blank" rel="noopener">↗</a>
        </div>
      </div>`;
  }

  function renderPosts() {
    const feed = document.getElementById('feed');
    const list = filtered();
    console.log(`[renderPosts] allPosts=${allPosts.length} filtered=${list.length} showIG=${showIG} showTT=${showTT} group=${activeGroup} hideReviewed=${hideReviewed} required=${requiredTags.size}`);
    if (!list.length) {
      const reason = allPosts.length === 0 ? 'Nog geen posts binnen.' : `${allPosts.length} posts aanwezig maar verborgen door actieve filters.`;
      feed.innerHTML = `<div class="empty"><h2>Geen posts gevonden</h2><p>${reason}</p></div>`;
      return;
    }
    try {
      const html = list.map(cardHtml).join('');
      feed.innerHTML = html;
      console.log(`[feed] DOM children: ${feed.children.length}, app display: ${document.getElementById('app').style.display}, first post id: ${list[0]?.id}`);
    } catch(e) {
      console.error('[renderPosts] cardHtml fout:', e);
      feed.innerHTML = list.map(p => {
        try { return cardHtml(p); }
        catch(e2) { return `<div class="card" style="padding:14px;color:var(--red)">⚠️ Render error voor post ${p.id}: ${e2.message}</div>`; }
      }).join('');
    }
    list.forEach(p => knownIds.add(p.id));
  }

  // ── Theme toggle ───────────────────────────────────────────────────────────
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('themeBtn').textContent = next === 'light' ? '🌙' : '☀';
    try { localStorage.setItem('4d-theme', next); } catch(e) {}
  }
  (function initTheme() {
    let pref = 'dark';
    try { pref = localStorage.getItem('4d-theme') || 'dark'; } catch(e) {}
    document.documentElement.setAttribute('data-theme', pref);
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = pref === 'light' ? '🌙' : '☀';
  })();

  // ── Socket.io ──────────────────────────────────────────────────────────────
  const socket = io({ path: (window.__BASE || '') + '/socket.io' });

  socket.on('connect',    () => { document.getElementById('dot').classList.remove('off'); });
  socket.on('disconnect', () => { document.getElementById('dot').classList.add('off'); });

  socket.on('topics:list', list => { window._topicList = list; renderTopicGrid(list); });

  socket.on('topic:active', t => {
    activeTopic = t;
    document.getElementById('topicName').textContent = t.name;
    document.getElementById('fA').textContent = t.groupA.name;
    document.getElementById('fB').textContent = t.groupB.name;
    document.getElementById('launcher').style.display = 'none';
    document.getElementById('app').style.display      = 'block';
    if (allPosts.length) renderPosts();
  });

  socket.on('posts:update', posts => {
    allPosts = posts;
    document.getElementById('stats').textContent = `${posts.length} posts · ${new Date().toLocaleTimeString('nl-NL')}`;
    renderPosts();
  });

  socket.on('hashtags:update', tags => {
    if (activeTopic) activeTopic.hashtags = tags;
    renderHashtagBar(activeTopic, tags);
  });

  socket.on('post:reviewed', ({ postId, status }) => {
    const p = allPosts.find(x=>x.id===postId);
    if (p) p.reviewStatus = status;
    renderPosts();
  });

  // ── Manual refresh ─────────────────────────────────────────────────────────
  let refreshTimer = null;
  function manualScrape() {
    const btn = document.getElementById('refreshBtn');
    if (btn.classList.contains('loading')) return;
    socket.emit('scrape:now');
  }
  socket.on('scrape:started', () => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    btn.textContent = '↻ Bezig…';
  });
  socket.on('scrape:cooldown', secs => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    clearInterval(refreshTimer);
    let remaining = secs || 5;
    btn.textContent = `↻ Wacht ${remaining}s`;
    refreshTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(refreshTimer);
        btn.classList.remove('loading');
        btn.textContent = '↻ Vernieuwen';
      } else {
        btn.textContent = `↻ Wacht ${remaining}s`;
      }
    }, 1000);
  });
  socket.on('scrape:done', () => {
    clearInterval(refreshTimer);
    const btn = document.getElementById('refreshBtn');
    btn.classList.remove('loading');
    btn.textContent = '↻ Vernieuwen';
  });

  socket.on('hashtags:suggestions', suggestions => {
    const bar   = document.getElementById('suggestBar');
    const pills = document.getElementById('suggestPills');
    if (!suggestions.length) {
      bar.classList.remove('has-suggestions');
      return;
    }
    bar.classList.add('has-suggestions');
    pills.innerHTML = suggestions.map(s => `
      <span class="suggest-pill">
        #${esc(s.tag)}
        <span class="sp-count">${s.count}×</span>
        <span class="sp-ok" onclick="approveHashtag('${s.tag}')" title="Toevoegen aan groep…">✓</span>
        <span class="sp-no" onclick="rejectHashtag('${s.tag}')" title="Afwijzen">✕</span>
      </span>`).join('');
  });

  function approveHashtag(tag) {
    if (!activeTopic) return;
    const gA = activeTopic.groupA?.name || 'A';
    const gB = activeTopic.groupB?.name || 'B';
    window.__pickGroup(tag, gA, gB).then(choice => {
      if (choice === null) return;
      socket.emit('hashtag:approve', { tag, group: choice });
    });
  }
  function rejectHashtag(tag)  { socket.emit('hashtag:reject',  { tag }); }
  function dismissAllSuggestions() {
    const pills = document.getElementById('suggestPills');
    const tags = [...pills.querySelectorAll('.suggest-pill')].map(el => el.textContent.trim().match(/#(\S+)/)?.[1]).filter(Boolean);
    tags.forEach(tag => socket.emit('hashtag:reject', { tag }));
  }

  window.__pickGroup = function(tag, gA, gB) {
    // Inline groepkeuze zonder externe modal
    const d = document.createElement('dialog');
    d.style.cssText = 'border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);padding:20px 24px;min-width:220px;text-align:center;';
    d.innerHTML = `<p style="margin:0 0 14px;font-size:.9rem;">Voeg <strong>#${esc(tag)}</strong> toe aan:</p>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button id="__pgA" style="flex:1;padding:8px 0;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:700;">${esc(gA)}</button>
        <button id="__pgB" style="flex:1;padding:8px 0;border-radius:8px;border:none;background:var(--amber,#f59e0b);color:#fff;cursor:pointer;font-weight:700;">${esc(gB)}</button>
      </div>
      <button id="__pgC" style="margin-top:10px;font-size:.75rem;background:none;border:none;color:var(--muted);cursor:pointer;">Annuleren</button>`;
    document.body.appendChild(d);
    d.showModal();
    return new Promise(resolve => {
      d.querySelector('#__pgA').onclick = () => { d.close(); d.remove(); resolve('a'); };
      d.querySelector('#__pgB').onclick = () => { d.close(); d.remove(); resolve('b'); };
      d.querySelector('#__pgC').onclick = () => { d.close(); d.remove(); resolve(null); };
    });
  };

  // ── Instagram session upload ───────────────────────────────────────────────────
  async function uploadIgSession(input) {
    const file = input.files[0];
    if (!file) return;
    const statusEl = document.getElementById('igUploadStatus');
    statusEl.textContent = '⏳ Uploaden…';
    const formData = new FormData();
    formData.append('session', file);
    try {
      const res  = await fetch(`${window.__BASE || ''}/instagram/upload-session`, { method: 'POST', body: formData });
      const data = await res.json();
      if (data.ok) {
        statusEl.textContent = '✅ Sessie bijgewerkt!';
        setTimeout(() => { statusEl.textContent = ''; }, 5000);
      } else {
        statusEl.textContent = `❌ ${data.error}`;
      }
    } catch (err) {
      statusEl.textContent = `❌ ${err.message}`;
    }
    input.value = ''; // reset zodat je hetzelfde bestand opnieuw kunt uploaden
  }

  socket.on('instagram:status', ({ blocked }) => {
    const banner = document.getElementById('igBanner');
    if (blocked) {
      banner.classList.add('visible');
    } else {
      banner.classList.remove('visible');
      document.getElementById('igUploadStatus').textContent = '';
    }
  });
</script>
</body>
</html>
