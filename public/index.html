<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg:     #0f0f13;
      --card:   #1a1a24;
      --border: #2a2a3a;
      --text:   #e8e8f0;
      --muted:  #7a7a9a;
      --accent: #6c63ff;
      --ig:     #e1306c;
      --tt:     #ff0050;
      --green:  #22c55e;
      --red:    #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Launcher ─────────────────────────────────────────────────────────── */
    #launcher {
      position: fixed; inset: 0; z-index: 999; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 20px; overflow-y: auto;
    }
    #launcher h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: .85rem; margin-bottom: 28px; }
    .new-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 9px 22px; border-radius: 8px; cursor: pointer;
      font-size: .88rem; font-weight: 600; margin-bottom: 24px; transition: opacity .15s;
    }
    .new-btn:hover { opacity: .85; }
    .topic-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
      gap: 12px; width: 100%; max-width: 900px; margin-bottom: 16px;
    }
    .topic-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; cursor: pointer; transition: border-color .15s, transform .15s;
    }
    .topic-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .topic-card h3 { font-size: .95rem; margin-bottom: 6px; }
    .tc-meta { font-size: .73rem; color: var(--muted); line-height: 1.8; }
    .tc-groups { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .tc-gpill { font-size: .7rem; padding: 2px 8px; border-radius: 10px; }
    .tc-gpill.a { background: rgba(108,99,255,.18); color: var(--accent); }
    .tc-gpill.b { background: rgba(245,166,35,.18); color: #f5a623; }

    /* Create form */
    #createForm {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 22px; width: 100%; max-width: 640px; margin-bottom: 22px; display: none;
    }
    #createForm h2 { font-size: 1rem; margin-bottom: 14px; }
    .cf-input {
      width: 100%; padding: 8px 11px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: .85rem; margin-bottom: 12px;
    }
    .cf-input:focus { outline: none; border-color: var(--accent); }
    .group-section { margin-bottom: 16px; }
    .group-label {
      font-size: .75rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px;
    }
    .group-label span { font-size: .85rem; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; min-height: 26px; }
    .tag-pill {
      background: rgba(108,99,255,.15); color: var(--accent); border: 1px solid var(--accent);
      border-radius: 20px; padding: 2px 9px; font-size: .75rem;
      display: flex; align-items: center; gap: 4px;
    }
    .tag-pill.b { background: rgba(245,166,35,.12); color: #f5a623; border-color: #f5a623; }
    .tag-pill .rm { cursor: pointer; opacity: .6; }
    .tag-pill .rm:hover { opacity: 1; color: var(--red); }
    .tag-add-row { display: flex; gap: 6px; }
    .tag-add-row input {
      flex: 1; padding: 6px 10px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .8rem;
    }
    .tag-add-row input:focus { outline: none; border-color: var(--accent); }
    .tag-add-row button {
      padding: 6px 12px; border-radius: 7px; border: none;
      background: var(--accent); color: #fff; cursor: pointer; font-size: .78rem;
    }
    .form-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-start {
      background: var(--green); color: #fff; border: none;
      padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .88rem;
    }
    .btn-cancel {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: .88rem;
    }

    /* ── Sticky top ───────────────────────────────────────────────────────── */
    #stickyTop { position: sticky; top: 0; z-index: 200; }

    header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 7px 14px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite;
    }
    .dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    #topicName { font-size: .88rem; font-weight: 700; white-space: nowrap; }
    #stats { font-size: .68rem; color: var(--muted); white-space: nowrap; }

    /* Filter buttons */
    .fbtn {
      padding: 3px 10px; border-radius: 16px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .73rem;
      transition: all .12s; white-space: nowrap;
    }
    .fbtn:hover { border-color: var(--accent); color: var(--text); }
    .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .fbtn.ga.active { background: var(--accent); border-color: var(--accent); }
    .fbtn.gb.active { background: #f5a623;      border-color: #f5a623; color: #000; }
    .fbtn.ig.active { background: var(--ig);    border-color: var(--ig); }
    .fbtn.tt.active { background: var(--tt);    border-color: var(--tt); }
    .fbtn.warn.active { background: var(--yellow,#eab308); border-color: var(--yellow,#eab308); color:#000; }
    .sep { color: var(--border); font-size: .8rem; }
    .hdr-btn {
      padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .73rem;
      transition: all .12s; margin-left: auto;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--text); }

    /* Hashtag bar */
    #hashtagBar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 5px 14px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
      font-size: .71rem;
    }
    .hpill {
      display: inline-flex; align-items: center; gap: 3px;
      border-radius: 10px; padding: 1px 7px; cursor: default;
    }
    .hpill.a { background: rgba(108,99,255,.15); color: var(--accent); }
    .hpill.b { background: rgba(245,166,35,.12); color: #f5a623; }
    .hpill.disc { background: rgba(100,100,100,.12); color: var(--muted); }
    .hpill { cursor: pointer; }
    .hpill.required { font-weight: 700; box-shadow: 0 0 0 2px currentColor; }
    .hpill.required.a    { background: var(--accent); color: #fff; }
    .hpill.required.b    { background: #f5a623; color: #000; }
    .hpill.required.disc { background: var(--muted); color: #fff; }
    .hpill .hx { cursor: pointer; opacity: .55; }
    .hpill .hx:hover { opacity: 1; color: var(--red); }
    #reqBar {
      padding: 3px 14px 5px; background: var(--card); border-bottom: 1px solid var(--border);
      display: none; flex-wrap: wrap; gap: 4px; align-items: center; font-size: .69rem;
    }
    #reqBar.has-req { display: flex; }
    .req-pill {
      display: inline-flex; align-items: center; gap: 3px; border-radius: 10px;
      padding: 1px 8px; background: rgba(239,68,68,.18); color: var(--red);
      border: 1px solid var(--red); font-weight: 700; cursor: pointer; font-size: .69rem;
    }
    .req-pill:hover { background: rgba(239,68,68,.35); }

    /* ── Feed ─────────────────────────────────────────────────────────────── */
    #feed {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
      gap: 14px; padding: 16px; max-width: 1800px; margin: 0 auto;
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; transition: transform .15s, box-shadow .15s; position: relative;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .card.fresh { animation: fadeIn .3s ease; }
    .card.used  { opacity: .45; border-color: var(--green); }
    .card.skipped { opacity: .35; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .review-badge {
      position: absolute; top: 8px; left: 8px; z-index: 2;
      padding: 2px 8px; border-radius: 10px; font-size: .65rem; font-weight: 700; text-transform: uppercase;
    }
    .review-badge.used    { background: var(--green); color: #000; }
    .review-badge.skipped { background: #444; color: #aaa; }

    .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--border); }
    .card-img-ph { width: 100%; aspect-ratio: 1; background: var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--muted); }
    .card-meta { padding: 7px 11px 0; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .badge { font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; }
    .badge.instagram { background: var(--ig); color: #fff; }
    .badge.tiktok    { background: var(--tt); color: #fff; }
    .badge.ga { background: rgba(108,99,255,.2); color: var(--accent); }
    .badge.gb { background: rgba(245,166,35,.2); color: #f5a623; }
    .card-author { margin-left: auto; font-size: .8rem; font-weight: 600; color: var(--text); text-decoration: none; }
    .card-author:hover { color: var(--accent); }
    .card-time  { padding: 2px 11px 0; font-size: .68rem; color: var(--muted); }
    .card-likes { font-size: .68rem; color: var(--muted); float: right; }
    .caption {
      padding: 5px 11px; font-size: .79rem; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; cursor: pointer;
    }
    .caption.open { display: block; -webkit-line-clamp: unset; }
    .actions { padding: 6px 11px 10px; display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .btn {
      padding: 3px 7px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .68rem;
      display: flex; align-items: center; gap: 2px; transition: all .12s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--text); }
    .btn.ok    { background: rgba(34,197,94,.12); color: var(--green); border-color: var(--green); }
    .btn.used  { background: rgba(34,197,94,.2);  color: var(--green); border-color: var(--green); }
    .btn.skip  { background: rgba(100,100,100,.18); color: var(--muted); }
    .btn-open  { margin-left: auto; padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border);
      color: var(--muted); font-size: .68rem; text-decoration: none; transition: all .12s; }
    .btn-open:hover { border-color: var(--accent); color: var(--text); }
    .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty h2 { font-size: 1.1rem; margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- ── Launcher ──────────────────────────────────────────────────────────── -->
<div id="launcher">
  <h1>🏆 Social Dashboard</h1>
  <p class="sub">Kies een onderwerp of start een nieuw dashboard</p>
  <button class="new-btn" onclick="showCreateForm()">+ Nieuw onderwerp</button>

  <div id="createForm">
    <h2>Nieuw onderwerp aanmaken</h2>
    <input class="cf-input" type="text" id="topicNameInput" placeholder="Naam onderwerp (bijv. Vierdaagse 2025)" />

    <div class="group-section">
      <div class="group-label">📘 Groep A — <input class="cf-input" style="display:inline;width:auto;padding:2px 7px;font-size:.82rem" type="text" id="groupAName" value="Vierdaagse" /></div>
      <div class="tag-row" id="rowA"></div>
      <div class="tag-add-row">
        <input type="text" id="inpA" placeholder="Hashtag (zonder #)" onkeydown="if(event.key==='Enter')addTag('a')" />
        <button onclick="addTag('a')">+</button>
      </div>
    </div>

    <div class="group-section">
      <div class="group-label">🟡 Groep B — <input class="cf-input" style="display:inline;width:auto;padding:2px 7px;font-size:.82rem" type="text" id="groupBName" value="Feesten" /></div>
      <div class="tag-row" id="rowB"></div>
      <div class="tag-add-row">
        <input type="text" id="inpB" placeholder="Hashtag (zonder #)" onkeydown="if(event.key==='Enter')addTag('b')" />
        <button onclick="addTag('b')">+</button>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-start"  onclick="createTopic()">Starten</button>
      <button class="btn-cancel" onclick="hideCreateForm()">Annuleren</button>
    </div>
  </div>

  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- ── Dashboard ─────────────────────────────────────────────────────────── -->
<div id="app" style="display:none">
  <div id="stickyTop">
    <header>
      <div class="dot" id="dot"></div>
      <span id="topicName">–</span>
      <span class="sep">|</span>

      <!-- Group filter (radio) -->
      <button class="fbtn active" id="fAll" onclick="setGroupFilter('all',this)">Alles</button>
      <button class="fbtn ga"     id="fA"   onclick="setGroupFilter('a',this)">Groep A</button>
      <button class="fbtn gb"     id="fB"   onclick="setGroupFilter('b',this)">Groep B</button>
      <span class="sep">|</span>

      <!-- Platform toggles (independent) -->
      <button class="fbtn ig active" id="fIG" onclick="togglePlatform('instagram')">Instagram</button>
      <button class="fbtn tt active" id="fTT" onclick="togglePlatform('tiktok')">TikTok</button>
      <span class="sep">|</span>

      <!-- Sort -->
      <button class="fbtn" id="sortBtn" onclick="toggleSort()">📊 Datum</button>

      <!-- Hide reviewed -->
      <button class="fbtn" id="hideBtn" onclick="toggleHideReviewed()">👁 Beoordeeld</button>

      <span id="stats"></span>
      <button class="hdr-btn" onclick="switchTopic()">⇄ Wissel</button>
    </header>

    <div id="hashtagBar"></div>
    <div id="reqBar">
      <span style="color:var(--muted);margin-right:4px;white-space:nowrap">🔍 Verplicht:</span>
      <span id="reqPills"></span>
      <button class="fbtn" style="margin-left:auto;font-size:.68rem;padding:2px 8px" onclick="clearRequired()">✕ Wis filter</button>
    </div>
  </div>

  <div id="feed"></div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let allPosts       = [];
  let knownIds       = new Set();
  let activeGroup    = 'all';
  let showIG         = true;
  let showTT         = true;
  let sortByLikes    = false;
  let hideReviewed   = false;
  let requiredTags   = new Set();
  let activeTopic    = null;
  let newTags        = {
    a: ['4daagse','nijmeegsevierdaagse','vierdaagse','nijmegen','vierdaagse2025'],
    b: ['vierdaagsefeesten','4daagsefeesten'],
  };

  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const timeLabel = ts => new Date(ts).toLocaleString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});

  // ── Launcher ───────────────────────────────────────────────────────────────
  function renderTopicGrid(list) {
    const el = document.getElementById('topicGrid');
    if (!list.length) {
      el.innerHTML = '<p style="color:var(--muted);grid-column:1/-1">Nog geen onderwerpen. Maak er een aan!</p>';
      return;
    }
    el.innerHTML = list.map(t => `
      <div class="topic-card" onclick="selectTopic('${t.id}')">
        <h3>${esc(t.name)}</h3>
        <div class="tc-meta">
          📅 ${new Date(t.lastActiveAt).toLocaleString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
          &nbsp;·&nbsp; ✅ ${t.reviewedCount} beoordeeld
        </div>
        <div class="tc-groups">
          <span class="tc-gpill a">📘 ${esc(t.groupA.name)}: ${t.groupA.hashtags.slice(0,3).map(h=>'#'+h).join(' ')}${t.groupA.hashtags.length>3?' …':''}</span>
          ${t.groupB.hashtags.length ? `<span class="tc-gpill b">🟡 ${esc(t.groupB.name)}: ${t.groupB.hashtags.slice(0,3).map(h=>'#'+h).join(' ')}${t.groupB.hashtags.length>3?' …':''}</span>` : ''}
        </div>
        <div style="margin-top:10px;display:flex;gap:6px">
          <button class="btn-start" style="font-size:.75rem;padding:4px 12px" onclick="event.stopPropagation();selectTopic('${t.id}')">▶ Open</button>
          <button class="btn-cancel" style="font-size:.75rem;padding:4px 10px" onclick="event.stopPropagation();editTopic('${t.id}')">✏️ Bewerk</button>
        </div>
      </div>`).join('');
  }

  function showCreateForm() {
    editingTopicId = null;
    newTags.a = ['4daagse','nijmeegsevierdaagse','vierdaagse','nijmegen','vierdaagse2025'];
    newTags.b = ['vierdaagsefeesten','4daagsefeesten'];
    document.getElementById('topicNameInput').value = '';
    document.getElementById('groupAName').value     = 'Vierdaagse';
    document.getElementById('groupBName').value     = 'Feesten';
    document.getElementById('createForm').style.display = 'block';
    document.querySelector('#createForm .btn-start').textContent = 'Starten';
    renderNewTags('a'); renderNewTags('b');
    document.getElementById('topicNameInput').focus();
  }

  function renderNewTags(grp) {
    const cls = grp === 'b' ? ' b' : '';
    document.getElementById('row'+grp.toUpperCase()).innerHTML =
      newTags[grp].map((t,i) =>
        `<span class="tag-pill${cls}">#${esc(t)}<span class="rm" onclick="removeTag('${grp}',${i})">×</span></span>`
      ).join('');
  }
  function addTag(grp) {
    const inp = document.getElementById('inp'+grp.toUpperCase());
    const v = inp.value.trim().replace(/^#/,'').toLowerCase();
    if (v && !newTags[grp].includes(v) && !newTags[grp === 'a' ? 'b' : 'a'].includes(v)) {
      newTags[grp].push(v); renderNewTags(grp);
    }
    inp.value = '';
  }
  function removeTag(grp, i) { newTags[grp].splice(i,1); renderNewTags(grp); }

  function createTopic() {
    const name = document.getElementById('topicNameInput').value.trim();
    if (!name) { alert('Geef het onderwerp een naam.'); return; }
    if (!newTags.a.length && !newTags.b.length) { alert('Voeg minimaal één hashtag toe.'); return; }
    const payload = {
      name,
      groupA: { name: document.getElementById('groupAName').value || 'Groep A', hashtags: [...newTags.a] },
      groupB: { name: document.getElementById('groupBName').value || 'Groep B', hashtags: [...newTags.b] },
    };
    if (editingTopicId) {
      socket.emit('topic:update', { id: editingTopicId, ...payload });
      editingTopicId = null;
    } else {
      socket.emit('topic:create', payload);
    }
    hideCreateForm();
  }
  function hideCreateForm() {
    document.getElementById('createForm').style.display = 'none';
    document.querySelector('#createForm .btn-start').textContent = 'Starten';
    editingTopicId = null;
  }
  function selectTopic(id) { socket.emit('topic:select', { id }); }

  let editingTopicId = null;
  function editTopic(id) {
    const t = (window._topicList || []).find(x => x.id === id);
    if (!t) return;
    editingTopicId = id;
    newTags.a = [...t.groupA.hashtags];
    newTags.b = [...t.groupB.hashtags];
    document.getElementById('topicNameInput').value = t.name;
    document.getElementById('groupAName').value     = t.groupA.name;
    document.getElementById('groupBName').value     = t.groupB.name;
    document.getElementById('createForm').style.display = 'block';
    // Change button label
    document.querySelector('#createForm .btn-start').textContent = 'Opslaan';
    renderNewTags('a'); renderNewTags('b');
    document.getElementById('topicNameInput').focus();
  }
  function switchTopic() {
    document.getElementById('launcher').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  // ── Hashtag bar ────────────────────────────────────────────────────────────
  function renderHashtagBar(topic, hashtags) {
    if (!topic) return;
    const setA = new Set(topic.groupA.hashtags);
    const setB = new Set(topic.groupB.hashtags);
    document.getElementById('hashtagBar').innerHTML =
      '<span style="color:var(--muted);margin-right:4px;white-space:nowrap;font-size:.7rem">Volgend:</span>' +
      hashtags.map(t => {
        const cls = setA.has(t) ? 'a' : setB.has(t) ? 'b' : 'disc';
        const req = requiredTags.has(t) ? ' required' : '';
        return `<span class="hpill ${cls}${req}" onclick="toggleRequired('${t}')" title="Klik om te filteren op deze tag">#${esc(t)}<span class="hx" onclick="event.stopPropagation();toggleHashtag('${t}')">×</span></span>`;
      }).join('');
    renderReqBar();
  }
  function toggleRequired(tag) {
    if (requiredTags.has(tag)) requiredTags.delete(tag);
    else requiredTags.add(tag);
    renderHashtagBar(activeTopic, activeTopic?.hashtags || []);
    renderPosts();
  }
  function clearRequired() {
    requiredTags.clear();
    renderHashtagBar(activeTopic, activeTopic?.hashtags || []);
    renderPosts();
  }
  function renderReqBar() {
    const bar = document.getElementById('reqBar');
    if (requiredTags.size === 0) { bar.classList.remove('has-req'); return; }
    bar.classList.add('has-req');
    document.getElementById('reqPills').innerHTML =
      [...requiredTags].map(t =>
        `<span class="req-pill" onclick="toggleRequired('${t}')">#${esc(t)} ×</span>`
      ).join('');
  }
  function toggleHashtag(tag) {
    socket.emit('topic:updateHashtags', {
      hashtags: (activeTopic?.hashtags || []).filter(h => h !== tag)
    });
  }

  // ── Filters ────────────────────────────────────────────────────────────────
  function setGroupFilter(f, btn) {
    activeGroup = f;
    ['fAll','fA','fB'].forEach(id => document.getElementById(id)?.classList.remove('active'));
    btn.classList.add('active');
    renderPosts();
  }
  function togglePlatform(p) {
    if (p === 'instagram') { showIG = !showIG; document.getElementById('fIG').classList.toggle('active', showIG); }
    else                   { showTT = !showTT; document.getElementById('fTT').classList.toggle('active', showTT); }
    renderPosts();
  }
  function toggleSort() {
    sortByLikes = !sortByLikes;
    document.getElementById('sortBtn').textContent = sortByLikes ? '📊 Likes' : '📊 Datum';
    renderPosts();
  }
  function toggleHideReviewed() {
    hideReviewed = !hideReviewed;
    document.getElementById('hideBtn').classList.toggle('active', hideReviewed);
    renderPosts();
  }

  function filtered() {
    let posts = allPosts.filter(p => {
      if (hideReviewed && p.reviewStatus) return false;
      if (!showIG && p.platform === 'instagram') return false;
      if (!showTT && p.platform === 'tiktok')    return false;
      if (activeGroup === 'a' && p.group !== 'a' && p.group !== 'both') return false;
      if (activeGroup === 'b' && p.group !== 'b' && p.group !== 'both') return false;
      if (requiredTags.size > 0) {
        const postTags = new Set(p.hashtags || []);
        if (![...requiredTags].every(t => postTags.has(t))) return false;
      }
      return true;
    });
    return sortByLikes ? [...posts].sort((a,b)=>b.likes-a.likes) : posts;
  }

  // ── Group badge label ──────────────────────────────────────────────────────
  function groupBadge(p) {
    if (!activeTopic) return '';
    const gA = activeTopic.groupA?.name || 'A';
    const gB = activeTopic.groupB?.name || 'B';
    if (p.group === 'both') return `<span class="badge ga">${esc(gA)}</span><span class="badge gb">${esc(gB)}</span>`;
    if (p.group === 'a') return `<span class="badge ga">${esc(gA)}</span>`;
    if (p.group === 'b') return `<span class="badge gb">${esc(gB)}</span>`;
    return '';
  }

  // ── Copy helpers ──────────────────────────────────────────────────────────
  function flash(el, text) {
    if (!el) return; const orig = el.textContent;
    el.textContent = text; el.classList.add('ok');
    setTimeout(() => { el.textContent = orig; el.classList.remove('ok'); }, 2000);
  }
  function copyText(id) {
    const p = allPosts.find(x=>x.id===id); if (!p) return;
    navigator.clipboard.writeText(p.caption)
      .then(() => flash(document.querySelector(`[data-copy="${id}"]`), '✓ Gekopieerd'));
  }
  function copyEmbed(id) {
    const p = allPosts.find(x=>x.id===id); if (!p||!p.imageUrl) return;
    const s = `<a href="${esc(p.postUrl)}" target="_blank" rel="noopener"><img src="${esc(p.imageUrl)}" alt="${esc(p.caption.slice(0,80))}" style="max-width:100%;height:auto;" loading="lazy"></a>`;
    navigator.clipboard.writeText(s)
      .then(() => flash(document.querySelector(`[data-embed="${id}"]`), '✓ Gekopieerd'));
  }
  function toggleCaption(id) { document.querySelector(`[data-cap="${id}"]`)?.classList.toggle('open'); }
  function reviewPost(id, status) {
    const p = allPosts.find(x=>x.id===id);
    socket.emit('post:review', { postId: id, status: p?.reviewStatus===status ? null : status });
  }

  // ── Card render ────────────────────────────────────────────────────────────
  function cardHtml(p) {
    const fresh = !knownIds.has(p.id) ? ' fresh' : '';
    const rs    = p.reviewStatus || '';
    const imgEl = p.imageUrl
      ? `<a href="${esc(p.postUrl)}" target="_blank" rel="noopener"><img class="card-img" src="${esc(p.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none'"></a>`
      : `<div class="card-img-ph">${p.platform==='tiktok'?'🎵':'📷'}</div>`;
    const embedBtn = p.imageUrl ? `<button class="btn" data-embed="${p.id}" onclick="copyEmbed('${p.id}')">🖼️ Embed</button>` : '';
    const capEl   = p.caption  ? `<div class="caption" data-cap="${p.id}" onclick="toggleCaption('${p.id}')">${esc(p.caption)}</div>` : '';
    const badge   = rs ? `<div class="review-badge ${rs}">${rs==='used'?'✓ Gebruikt':'✗ Skip'}</div>` : '';
    return `
      <div class="card${fresh}${rs?' '+rs:''}">
        ${badge}
        ${imgEl}
        <div class="card-meta">
          <span class="badge ${p.platform}">${p.platform}</span>
          ${groupBadge(p)}
          <a class="card-author" href="${esc(p.authorUrl)}" target="_blank" rel="noopener">@${esc(p.author)}</a>
        </div>
        <div class="card-time">${timeLabel(p.timestamp)}<span class="card-likes">❤️ ${p.likes.toLocaleString('nl-NL')}</span></div>
        ${capEl}
        <div class="actions">
          <button class="btn" data-copy="${p.id}" onclick="copyText('${p.id}')">📋 Tekst</button>
          ${embedBtn}
          <button class="btn${rs==='used'?' used':''}"    onclick="reviewPost('${p.id}','used')">✓</button>
          <button class="btn${rs==='skipped'?' skip':''}" onclick="reviewPost('${p.id}','skipped')">✗</button>
          <a class="btn-open" href="${esc(p.postUrl)}" target="_blank" rel="noopener">↗</a>
        </div>
      </div>`;
  }

  function renderPosts() {
    const feed = document.getElementById('feed');
    const list = filtered();
    if (!list.length) {
      feed.innerHTML = '<div class="empty"><h2>Geen posts gevonden</h2><p>Pas het filter aan of wacht op de volgende scrape.</p></div>';
      return;
    }
    feed.innerHTML = list.map(cardHtml).join('');
    list.forEach(p => knownIds.add(p.id));
  }

  // ── Socket.io ──────────────────────────────────────────────────────────────
  const socket = io({ path: (window.__BASE || '') + '/socket.io' });

  socket.on('connect',    () => { document.getElementById('dot').classList.remove('off'); });
  socket.on('disconnect', () => { document.getElementById('dot').classList.add('off'); });

  socket.on('topics:list', list => { window._topicList = list; renderTopicGrid(list); });

  socket.on('topic:active', t => {
    activeTopic = t;
    document.getElementById('topicName').textContent = t.name;
    document.getElementById('fA').textContent = t.groupA.name;
    document.getElementById('fB').textContent = t.groupB.name;
    document.getElementById('launcher').style.display = 'none';
    document.getElementById('app').style.display      = 'block';
  });

  socket.on('posts:update', posts => {
    allPosts = posts;
    document.getElementById('stats').textContent = `${posts.length} posts · ${new Date().toLocaleTimeString('nl-NL')}`;
    renderPosts();
  });

  socket.on('hashtags:update', tags => {
    if (activeTopic) activeTopic.hashtags = tags;
    renderHashtagBar(activeTopic, tags);
  });

  socket.on('post:reviewed', ({ postId, status }) => {
    const p = allPosts.find(x=>x.id===postId);
    if (p) p.reviewStatus = status;
    renderPosts();
  });
</script>
</body>
</html>
