<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg:      #0f0f13;
      --card:    #1a1a24;
      --border:  #2a2a3a;
      --text:    #e8e8f0;
      --muted:   #7a7a9a;
      --accent:  #6c63ff;
      --ig:      #e1306c;
      --tt:      #ff0050;
      --day:     #f5a623;
      --night:   #4a90e2;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #eab308;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Launcher ─────────────────────────────────────────────────────────── */
    #launcher {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 40px 20px;
      overflow-y: auto;
    }
    #launcher h1 { font-size: 1.6rem; margin-bottom: 6px; }
    #launcher .sub { color: var(--muted); margin-bottom: 32px; font-size: .9rem; }

    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px; width: 100%; max-width: 900px; margin-bottom: 20px;
    }
    .topic-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px; cursor: pointer;
      transition: border-color .15s, transform .15s;
    }
    .topic-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .topic-card h3 { font-size: 1rem; margin-bottom: 6px; }
    .topic-card .tc-meta { font-size: .75rem; color: var(--muted); line-height: 1.8; }
    .topic-card .tc-tags { font-size: .72rem; color: var(--accent); margin-top: 8px; }

    .new-btn {
      background: var(--accent); color: #fff; border: none;
      padding: 10px 22px; border-radius: 8px; cursor: pointer;
      font-size: .9rem; font-weight: 600; margin-bottom: 28px;
      transition: opacity .15s;
    }
    .new-btn:hover { opacity: .85; }

    /* Create form */
    #createForm {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; width: 100%; max-width: 600px;
      margin-bottom: 24px; display: none;
    }
    #createForm h2 { margin-bottom: 16px; font-size: 1.1rem; }
    #createForm input[type=text] {
      width: 100%; padding: 9px 12px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: .9rem; margin-bottom: 14px;
    }
    #createForm input[type=text]:focus { outline: none; border-color: var(--accent); }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag-pill {
      background: rgba(108,99,255,.15); color: var(--accent);
      border: 1px solid var(--accent); border-radius: 20px;
      padding: 3px 10px; font-size: .78rem; display: flex; align-items: center; gap: 5px;
    }
    .tag-pill .rm { cursor: pointer; color: var(--muted); }
    .tag-pill .rm:hover { color: var(--red); }
    .tag-add-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .tag-add-row input { flex: 1; padding: 7px 10px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: .82rem; }
    .tag-add-row input:focus { outline: none; border-color: var(--accent); }
    .tag-add-row button { padding: 7px 14px; border-radius: 7px; border: none;
      background: var(--accent); color: #fff; cursor: pointer; font-size: .82rem; }
    .form-actions { display: flex; gap: 8px; }
    .btn-start { background: var(--green); color: #fff; border: none;
      padding: 9px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .9rem; }
    .btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border);
      padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: .9rem; }

    /* ── App shell ────────────────────────────────────────────────────────── */
    #app { display: none; }

    header {
      position: sticky; top: 0; z-index: 200;
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 9px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite; flex-shrink: 0; }
    .dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    #topicName { font-size: .95rem; font-weight: 700; }
    #topicMeta { font-size: .72rem; color: var(--muted); }
    #stats { margin-left: auto; font-size: .72rem; color: var(--muted); white-space: nowrap; }
    .hdr-btn {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .75rem;
      transition: all .15s;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Hashtag bar ──────────────────────────────────────────────────────── */
    #hashtagBar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 7px 16px; font-size: .73rem; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    }
    .hpill {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(108,99,255,.15); color: var(--accent);
      padding: 2px 8px; border-radius: 10px; cursor: default;
    }
    .hpill.off { background: rgba(100,100,100,.12); color: var(--muted); text-decoration: line-through; }
    .hpill .hx { cursor: pointer; opacity: .6; }
    .hpill .hx:hover { opacity: 1; color: var(--red); }

    /* ── Filters ──────────────────────────────────────────────────────────── */
    #filters {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 7px 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    }
    .fbtn {
      padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .78rem;
      transition: all .15s;
    }
    .fbtn:hover  { border-color: var(--accent); color: var(--text); }
    .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .fbtn.day.active   { background: var(--day);  border-color: var(--day); }
    .fbtn.night.active { background: var(--night); border-color: var(--night); }
    .fbtn.ig.active    { background: var(--ig);   border-color: var(--ig); }
    .fbtn.tt.active    { background: var(--tt);   border-color: var(--tt); }
    .sep { color: var(--border); }
    #hideReviewed { margin-left: auto; }

    /* ── Feed ─────────────────────────────────────────────────────────────── */
    #feed {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px; padding: 16px; max-width: 1800px; margin: 0 auto;
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      position: relative;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .card.fresh { animation: fadeIn .3s ease; }
    .card.used  { opacity: .45; border-color: var(--green); }
    .card.skipped { opacity: .35; border-color: var(--border); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .review-badge {
      position: absolute; top: 8px; left: 8px; z-index: 2;
      padding: 2px 9px; border-radius: 10px; font-size: .68rem; font-weight: 700;
      text-transform: uppercase;
    }
    .review-badge.used    { background: var(--green); color: #000; }
    .review-badge.skipped { background: var(--muted); color: #fff; }

    .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
      background: var(--border); }
    .card-img-ph { width: 100%; aspect-ratio: 1; background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: var(--muted); }
    .card-meta { padding: 8px 12px 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: .68rem; font-weight: 700; padding: 2px 8px;
      border-radius: 10px; text-transform: uppercase; }
    .badge.instagram { background: var(--ig); color: #fff; }
    .badge.tiktok    { background: var(--tt); color: #fff; }
    .badge.day   { background: rgba(245,166,35,.18); color: var(--day); }
    .badge.night { background: rgba(74,144,226,.18); color: var(--night); }
    .card-author { margin-left: auto; font-size: .82rem; font-weight: 600; color: var(--text);
      text-decoration: none; }
    .card-author:hover { color: var(--accent); }
    .card-time { padding: 3px 12px 0; font-size: .7rem; color: var(--muted); }
    .card-likes { font-size: .7rem; color: var(--muted); float: right; }
    .caption { padding: 6px 12px; font-size: .81rem; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden; cursor: pointer; }
    .caption.open { display: block; -webkit-line-clamp: unset; }
    .actions { padding: 7px 12px 11px; display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .btn {
      padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .7rem;
      display: flex; align-items: center; gap: 3px; transition: all .15s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--text); }
    .btn.ok    { background: rgba(34,197,94,.12); color: var(--green); border-color: var(--green); }
    .btn.used  { background: rgba(34,197,94,.2);  color: var(--green); border-color: var(--green); }
    .btn.skip  { background: rgba(100,100,100,.2); color: var(--muted); border-color: var(--border); }
    .btn-open  { margin-left: auto; padding: 4px 8px; border-radius: 6px;
      border: 1px solid var(--border); color: var(--muted); font-size: .7rem;
      text-decoration: none; transition: all .15s; }
    .btn-open:hover { border-color: var(--accent); color: var(--text); }

    .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty h2 { font-size: 1.2rem; margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- ── Launcher ──────────────────────────────────────────────────────────────── -->
<div id="launcher">
  <h1>🏆 Social Dashboard</h1>
  <p class="sub">Kies een onderwerp of start een nieuw dashboard</p>

  <button class="new-btn" onclick="showCreateForm()">+ Nieuw onderwerp</button>

  <div id="createForm">
    <h2>Nieuw onderwerp aanmaken</h2>
    <input type="text" id="topicNameInput" placeholder="Naam (bijv. Vierdaagse 2025)" />
    <div class="tag-row" id="newTagRow"></div>
    <div class="tag-add-row">
      <input type="text" id="newTagInput" placeholder="Hashtag toevoegen (zonder #)" onkeydown="if(event.key==='Enter')addNewTag()" />
      <button onclick="addNewTag()">+ Voeg toe</button>
    </div>
    <div class="form-actions">
      <button class="btn-start" onclick="createTopic()">Starten</button>
      <button class="btn-cancel" onclick="hideCreateForm()">Annuleren</button>
    </div>
  </div>

  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- ── Dashboard ─────────────────────────────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="dot" id="dot"></div>
    <div>
      <div id="topicName">–</div>
      <div id="topicMeta"></div>
    </div>
    <button class="hdr-btn" onclick="switchTopic()">⇄ Wissel</button>
    <span id="stats" style="margin-left:auto"></span>
  </header>

  <div id="hashtagBar">Hashtags laden…</div>

  <div id="filters">
    <button class="fbtn active" onclick="setFilter('all',this)">Alles</button>
    <button class="fbtn day"    onclick="setFilter('day',this)">☀️ Dag</button>
    <button class="fbtn night"  onclick="setFilter('night',this)">🌙 Nacht</button>
    <span class="sep">|</span>
    <button class="fbtn ig" onclick="setFilter('instagram',this)">Instagram</button>
    <button class="fbtn tt" onclick="setFilter('tiktok',this)">TikTok</button>
    <span class="sep">|</span>
    <button class="fbtn" id="sortBtn" onclick="toggleSort()">📊 Sorteren: Datum</button>
    <button class="fbtn" id="hideReviewed" onclick="toggleHideReviewed()">👁 Beoordeeld verbergen</button>
  </div>

  <div id="feed"></div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let allPosts        = [];
  let knownIds        = new Set();
  let activeFilter    = 'all';
  let sortByLikes     = false;
  let hideReviewed    = false;
  let activeHashtags  = [];
  let newTopicTags    = ['4daagse','nijmeegsevierdaagse','vierdaagse','vierdaagsefeesten','4daagsefeesten','nijmegen','vierdaagse2025'];
  let currentTopicId  = null;

  const isDayPost = ts => { const h = new Date(ts).getHours(); return h >= 6 && h < 19; };
  const timeLabel = ts => new Date(ts).toLocaleString('nl-NL',
    { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Launcher ───────────────────────────────────────────────────────────────
  function renderTopicGrid(list) {
    const grid = document.getElementById('topicGrid');
    if (!list.length) {
      grid.innerHTML = '<p style="color:var(--muted);grid-column:1/-1">Nog geen onderwerpen. Maak er een aan!</p>';
      return;
    }
    grid.innerHTML = list.map(t => `
      <div class="topic-card" onclick="selectTopic('${t.id}')">
        <h3>${esc(t.name)}</h3>
        <div class="tc-meta">
          📅 ${new Date(t.lastActiveAt).toLocaleString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}<br>
          ✅ ${t.reviewedCount} beoordeeld
        </div>
        <div class="tc-tags">${t.hashtags.slice(0,5).map(h=>'#'+h).join(' ')}${t.hashtags.length>5?' +'+( t.hashtags.length-5)+' meer':''}</div>
      </div>`).join('');
  }

  function showCreateForm() {
    document.getElementById('createForm').style.display = 'block';
    renderNewTags();
    document.getElementById('topicNameInput').focus();
  }
  function hideCreateForm() {
    document.getElementById('createForm').style.display = 'none';
  }
  function renderNewTags() {
    document.getElementById('newTagRow').innerHTML = newTopicTags.map((t,i) =>
      `<span class="tag-pill">#${esc(t)}<span class="rm" onclick="removeNewTag(${i})">×</span></span>`
    ).join('');
  }
  function addNewTag() {
    const inp = document.getElementById('newTagInput');
    const v = inp.value.trim().replace(/^#/, '').toLowerCase();
    if (v && !newTopicTags.includes(v)) { newTopicTags.push(v); renderNewTags(); }
    inp.value = '';
  }
  function removeNewTag(i) {
    newTopicTags.splice(i, 1);
    renderNewTags();
  }
  function createTopic() {
    const name = document.getElementById('topicNameInput').value.trim();
    if (!name) { alert('Geef het onderwerp een naam.'); return; }
    if (!newTopicTags.length) { alert('Voeg minimaal één hashtag toe.'); return; }
    socket.emit('topic:create', { name, hashtags: [...newTopicTags] });
  }
  function selectTopic(id) {
    socket.emit('topic:select', { id });
  }
  function switchTopic() {
    document.getElementById('launcher').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  // ── Hashtag management ────────────────────────────────────────────────────
  function renderHashtagBar(tags) {
    activeHashtags = [...tags];
    document.getElementById('hashtagBar').innerHTML =
      '<strong style="color:var(--muted);margin-right:6px;white-space:nowrap">Volgend:</strong>' +
      tags.map(t =>
        `<span class="hpill" id="hp_${t}">#${esc(t)}<span class="hx" onclick="toggleHashtag('${t}')">×</span></span>`
      ).join('');
  }
  function toggleHashtag(tag) {
    const idx = activeHashtags.indexOf(tag);
    if (idx === -1) return;
    activeHashtags.splice(idx, 1);
    socket.emit('topic:updateHashtags', { hashtags: activeHashtags });
  }

  // ── Filters & sort ────────────────────────────────────────────────────────
  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPosts();
  }
  function toggleSort() {
    sortByLikes = !sortByLikes;
    document.getElementById('sortBtn').textContent =
      '📊 Sorteren: ' + (sortByLikes ? 'Likes' : 'Datum');
    renderPosts();
  }
  function toggleHideReviewed() {
    hideReviewed = !hideReviewed;
    const btn = document.getElementById('hideReviewed');
    btn.classList.toggle('active', hideReviewed);
    btn.textContent = hideReviewed ? '👁 Toon beoordeeld' : '👁 Beoordeeld verbergen';
    renderPosts();
  }

  function filtered() {
    let posts = allPosts.filter(p => {
      if (hideReviewed && p.reviewStatus) return false;
      if (activeFilter === 'all') return true;
      if (activeFilter === 'day')   return  isDayPost(p.timestamp);
      if (activeFilter === 'night') return !isDayPost(p.timestamp);
      return p.platform === activeFilter;
    });
    if (sortByLikes) posts = [...posts].sort((a,b) => b.likes - a.likes);
    return posts;
  }

  // ── Copy helpers ──────────────────────────────────────────────────────────
  function flash(el, text) {
    if (!el) return;
    const orig = el.textContent;
    el.textContent = text; el.classList.add('ok');
    setTimeout(() => { el.textContent = orig; el.classList.remove('ok'); }, 2000);
  }
  function copyText(id) {
    const p = allPosts.find(x => x.id === id);
    if (!p) return;
    navigator.clipboard.writeText(p.caption)
      .then(() => flash(document.querySelector(`[data-copy="${id}"]`), '✓ Gekopieerd'));
  }
  function copyEmbed(id) {
    const p = allPosts.find(x => x.id === id);
    if (!p || !p.imageUrl) return;
    const snippet = `<a href="${esc(p.postUrl)}" target="_blank" rel="noopener"><img src="${esc(p.imageUrl)}" alt="${esc(p.caption.slice(0,80))}" style="max-width:100%;height:auto;" loading="lazy"></a>`;
    navigator.clipboard.writeText(snippet)
      .then(() => flash(document.querySelector(`[data-embed="${id}"]`), '✓ Gekopieerd'));
  }
  function toggleCaption(id) {
    document.querySelector(`[data-cap="${id}"]`)?.classList.toggle('open');
  }

  // ── Review ────────────────────────────────────────────────────────────────
  function reviewPost(id, status) {
    // Toggle: click same status again to undo
    const p = allPosts.find(x => x.id === id);
    const newStatus = p?.reviewStatus === status ? null : status;
    socket.emit('post:review', { postId: id, status: newStatus });
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function cardHtml(p) {
    const tod    = isDayPost(p.timestamp) ? 'day' : 'night';
    const fresh  = !knownIds.has(p.id) ? ' fresh' : '';
    const rs     = p.reviewStatus || '';
    const rsClass = rs ? ` ${rs}` : '';

    const reviewBadge = rs
      ? `<div class="review-badge ${rs}">${rs === 'used' ? '✓ Gebruikt' : '✗ Overgeslagen'}</div>` : '';

    const imgEl = p.imageUrl
      ? `<a href="${esc(p.postUrl)}" target="_blank" rel="noopener">
           <img class="card-img" src="${esc(p.imageUrl)}" alt="" loading="lazy"
                onerror="this.style.display='none'">
         </a>`
      : `<div class="card-img-ph">${p.platform==='tiktok'?'🎵':'📷'}</div>`;

    const embedBtn = p.imageUrl
      ? `<button class="btn" data-embed="${p.id}" onclick="copyEmbed('${p.id}')">🖼️ Embed</button>` : '';

    const capEl = p.caption
      ? `<div class="caption" data-cap="${p.id}" onclick="toggleCaption('${p.id}')">${esc(p.caption)}</div>` : '';

    const usedClass  = rs === 'used'    ? ' used' : '';
    const skipClass  = rs === 'skipped' ? ' skip' : '';

    return `
      <div class="card${fresh}${rsClass}">
        ${reviewBadge}
        ${imgEl}
        <div class="card-meta">
          <span class="badge ${p.platform}">${p.platform}</span>
          <span class="badge ${tod}">${tod==='day'?'☀️ Dag':'🌙 Nacht'}</span>
          <a class="card-author" href="${esc(p.authorUrl)}" target="_blank" rel="noopener">@${esc(p.author)}</a>
        </div>
        <div class="card-time">${timeLabel(p.timestamp)}<span class="card-likes">❤️ ${p.likes.toLocaleString('nl-NL')}</span></div>
        ${capEl}
        <div class="actions">
          <button class="btn" data-copy="${p.id}" onclick="copyText('${p.id}')">📋 Tekst</button>
          ${embedBtn}
          <button class="btn${usedClass}"  onclick="reviewPost('${p.id}','used')">✓ Gebruik</button>
          <button class="btn${skipClass}"  onclick="reviewPost('${p.id}','skipped')">✗ Skip</button>
          <a class="btn-open" href="${esc(p.postUrl)}" target="_blank" rel="noopener">↗</a>
        </div>
      </div>`;
  }

  function renderPosts() {
    const feed = document.getElementById('feed');
    const list = filtered();
    if (!list.length) {
      feed.innerHTML = '<div class="empty"><h2>Geen posts gevonden</h2><p>Pas het filter aan of wacht op de volgende scrape.</p></div>';
      return;
    }
    feed.innerHTML = list.map(cardHtml).join('');
    list.forEach(p => knownIds.add(p.id));
  }

  // ── Socket.io ──────────────────────────────────────────────────────────────
  const socket = io({ path: (window.__BASE || '') + '/socket.io' });

  socket.on('connect',    () => { document.getElementById('dot').classList.remove('off'); });
  socket.on('disconnect', () => {
    document.getElementById('dot').classList.add('off');
    document.getElementById('stats').textContent = 'Verbinding verbroken…';
  });

  socket.on('topics:list', list => {
    renderTopicGrid(list);
  });

  socket.on('topic:active', t => {
    currentTopicId = t.id;
    document.getElementById('topicName').textContent = t.name;
    document.getElementById('topicMeta').textContent =
      `${t.hashtags.length} hashtags · ${t.reviewedCount} beoordeeld`;
    // Show dashboard, hide launcher
    document.getElementById('launcher').style.display = 'none';
    document.getElementById('app').style.display      = 'block';
  });

  socket.on('posts:update', posts => {
    allPosts = posts;
    document.getElementById('stats').textContent =
      `${posts.length} posts · ${new Date().toLocaleTimeString('nl-NL')}`;
    renderPosts();
  });

  socket.on('hashtags:update', tags => renderHashtagBar(tags));

  socket.on('post:reviewed', ({ postId, status }) => {
    const p = allPosts.find(x => x.id === postId);
    if (p) p.reviewStatus = status;
    renderPosts();
  });
</script>
</body>
</html>
