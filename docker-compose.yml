services:
  vierdaagse-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      - PORT=3001
      # Uncomment and set if serving under a sub-path instead of a subdomain:
      # - BASE_PATH=/4d
      - BSKY_IDENTIFIER
      - BSKY_APP_PASSWORD
      - SESSION_SECRET
      - SESSIONS_DIR=/app/sessions
      - TOPICS_DIR=/app/topics
    volumes:
      # Sessions (Instagram/TikTok cookies + post cache) – can be recreated
      - sessions:/app/sessions
      # Topics (event definitions) – must survive rebuilds
      - topics:/app/topics
    restart: unless-stopped

volumes:
  sessions:
  topics:
